<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"

    />

    <!-- SEO -->
    <title>Cato Akay – Engineered Performance Coaching</title>

    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://catoakay.com" />

    <meta property="og:image" content="%PUBLIC_URL%/pic/cato1.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cato Akay – Engineered Performance Coaching" />
    <meta name="twitter:description" content="Elite functional fitness coaching. Norwegian Throwdown Champion. Software Engineer." />
    <meta name="twitter:image" content="%PUBLIC_URL%/pic/cato1.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Cato Akay",
      "jobTitle": "Performance Coach & Software Engineer",
      "description": "Elite functional fitness athlete, Norwegian Throwdown Champion, and senior software engineer offering data-driven performance coaching.",
      "url": "https://catoakay.com",
      "sameAs": [],
      "knowsAbout": ["CrossFit", "Functional Fitness", "Performance Coaching", "Software Engineering"]
    }
    </script>

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/akayLogo.jpeg" />
